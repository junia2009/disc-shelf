<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DISC SHELF — Icon Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #08080f;
      color: #eaeaff;
      font-family: 'Orbitron', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 3rem 1rem;
      min-height: 100vh;
    }
    h1 { font-size: 1.4rem; letter-spacing: 4px; color: #6C63FF; }
    p { font-family: sans-serif; color: #9595b8; font-size: 0.9rem; }
    .preview-wrap {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .preview-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }
    .preview-item span {
      font-family: sans-serif;
      font-size: 0.82rem;
      color: #5c5c7a;
    }
    canvas { border-radius: 22%; box-shadow: 0 0 32px rgba(108,99,255,.4); }
    .btn-group { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    button {
      background: linear-gradient(135deg, #6C63FF, #00C9A7);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.75rem 1.8rem;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      font-weight: 900;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 4px 20px rgba(108,99,255,.35);
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(108,99,255,.55); }
    .note {
      font-family: sans-serif;
      font-size: 0.82rem;
      color: #5c5c7a;
      text-align: center;
      max-width: 480px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <h1>DISC SHELF ICON GENERATOR</h1>
  <p>各サイズをダウンロードして、既存の icon.png と置き換えてください。</p>

  <div class="preview-wrap">
    <div class="preview-item">
      <canvas id="c512" width="512" height="512"></canvas>
      <span>512 × 512</span>
    </div>
    <div class="preview-item">
      <canvas id="c192" width="192" height="192"></canvas>
      <span>192 × 192</span>
    </div>
    <div class="preview-item">
      <canvas id="c180" width="180" height="180"></canvas>
      <span>180 × 180 (Apple Touch)</span>
    </div>
  </div>

  <div class="btn-group">
    <button onclick="dl('c512', 'icon-512.png')">512px ダウンロード</button>
    <button onclick="dl('c192', 'icon-192.png')">192px ダウンロード</button>
    <button onclick="dl('c180', 'icon-180.png')">180px ダウンロード</button>
    <button onclick="dlAll()">まとめてダウンロード</button>
  </div>

  <p class="note">
    ダウンロード後：<br>
    icon-512.png → icon.png にリネーム（または manifest.json を更新）<br>
    icon-180.png → Apple Touch Icon 用
  </p>

  <script>
    /* =============================================
       アイコン描画関数
    ============================================= */
    function drawIcon(canvas) {
      const size = canvas.width;
      const ctx = canvas.getContext('2d');
      const cx = size / 2;
      const cy = size / 2;

      /* ---- 共通ユーティリティ ---- */
      const s = v => v * (size / 512); // サイズ正規化

      /* ---- 背景（角丸矩形） ---- */
      const r = s(112);
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();

      const bgGrad = ctx.createRadialGradient(cx * 0.7, cy * 0.7, 0, cx, cy, size * 0.75);
      bgGrad.addColorStop(0, '#121228');
      bgGrad.addColorStop(1, '#08080f');
      ctx.fillStyle = bgGrad;
      ctx.fill();
      ctx.save();
      ctx.clip(); // 以降は角丸内にクリップ

      /* ---- 星フィールド ---- */
      const rng = mulberry32(42);
      for (let i = 0; i < 80; i++) {
        const x = rng() * size;
        const y = rng() * size;
        const dotR = rng() * s(1.6) + s(0.4);
        const alpha = 0.3 + rng() * 0.65;
        ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
        ctx.beginPath();
        ctx.arc(x, y, dotR, 0, Math.PI * 2);
        ctx.fill();
      }

      /* ---- 背面グロー ---- */
      const bgGlow = ctx.createRadialGradient(cx, cy, s(130), cx, cy, s(256));
      bgGlow.addColorStop(0, 'rgba(108,99,255,0.0)');
      bgGlow.addColorStop(1, 'rgba(108,99,255,0.22)');
      ctx.fillStyle = bgGlow;
      ctx.beginPath();
      ctx.arc(cx, cy, s(256), 0, Math.PI * 2);
      ctx.fill();

      /* ---- ビニール本体 ---- */
      const vinylGrad = ctx.createRadialGradient(cx - s(20), cy - s(20), 0, cx, cy, s(222));
      vinylGrad.addColorStop(0, '#1c1c32');
      vinylGrad.addColorStop(0.5, '#0e0e1c');
      vinylGrad.addColorStop(1, '#060610');
      ctx.fillStyle = vinylGrad;
      ctx.beginPath();
      ctx.arc(cx, cy, s(222), 0, Math.PI * 2);
      ctx.fill();

      /* ---- 溝リング ---- */
      for (let rad = s(82); rad < s(216); rad += s(18)) {
        const alpha = 0.055 + (rad / size) * 0.07;
        ctx.strokeStyle = `rgba(130,122,255,${alpha.toFixed(3)})`;
        ctx.lineWidth = s(1.8);
        ctx.beginPath();
        ctx.arc(cx, cy, rad, 0, Math.PI * 2);
        ctx.stroke();
      }

      /* ---- レインボーシーン　(超薄いグラデ) ---- */
      const sheen = ctx.createLinearGradient(cx - s(200), cy - s(140), cx + s(200), cy + s(140));
      sheen.addColorStop(0,    'rgba(108,99,255,0.0)');
      sheen.addColorStop(0.2,  'rgba(0,201,167,0.07)');
      sheen.addColorStop(0.45, 'rgba(255,215,0,0.055)');
      sheen.addColorStop(0.65, 'rgba(255,101,132,0.06)');
      sheen.addColorStop(1,    'rgba(108,99,255,0.0)');
      ctx.fillStyle = sheen;
      ctx.beginPath();
      ctx.arc(cx, cy, s(222), 0, Math.PI * 2);
      ctx.fill();

      /* ---- 外周グロー (2パス) ---- */
      ctx.save();
      ctx.shadowColor = '#6C63FF';
      ctx.shadowBlur = s(28);
      ctx.strokeStyle = '#6C63FF';
      ctx.lineWidth = s(7);
      ctx.beginPath();
      ctx.arc(cx, cy, s(222), 0, Math.PI * 2);
      ctx.stroke();
      ctx.shadowBlur = s(10);
      ctx.strokeStyle = 'rgba(200,196,255,0.55)';
      ctx.lineWidth = s(2.5);
      ctx.stroke();
      ctx.restore();

      /* ---- センターラベル ---- */
      const lblR = s(80);
      const lblGrad = ctx.createRadialGradient(cx - s(18), cy - s(18), 0, cx, cy, lblR);
      lblGrad.addColorStop(0, '#b8b3ff');
      lblGrad.addColorStop(0.4, '#6C63FF');
      lblGrad.addColorStop(1, '#00C9A7');
      ctx.save();
      ctx.shadowColor = '#6C63FF';
      ctx.shadowBlur = s(20);
      ctx.fillStyle = lblGrad;
      ctx.beginPath();
      ctx.arc(cx, cy, lblR, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      /* ---- ラベル内ハイライト ---- */
      const hiGrad = ctx.createRadialGradient(cx - s(24), cy - s(24), 0, cx, cy, lblR);
      hiGrad.addColorStop(0, 'rgba(255,255,255,0.28)');
      hiGrad.addColorStop(0.55, 'rgba(255,255,255,0.04)');
      hiGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = hiGrad;
      ctx.beginPath();
      ctx.arc(cx, cy, lblR, 0, Math.PI * 2);
      ctx.fill();

      /* ---- "DS" テキスト ---- */
      ctx.save();
      ctx.shadowColor = 'rgba(255,255,255,0.95)';
      ctx.shadowBlur = s(12);
      ctx.fillStyle = '#ffffff';
      ctx.font = `900 ${s(52)}px 'Orbitron', 'Arial Black', sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('DS', cx, cy);
      ctx.restore();

      /* ---- センターホール ---- */
      ctx.fillStyle = '#040408';
      ctx.beginPath();
      ctx.arc(cx, cy, s(16), 0, Math.PI * 2);
      ctx.fill();

      ctx.restore(); // clip 解除
    }

    /* 疑似乱数（シードあり、星の位置を固定） */
    function mulberry32(a) {
      return function () {
        a |= 0; a = (a + 0x6D2B79F5) | 0;
        let t = Math.imul(a ^ (a >>> 15), 1 | a);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    /* 初期描画 */
    ['c512', 'c192', 'c180'].forEach(id => {
      const cvs = document.getElementById(id);
      drawIcon(cvs);
    });

    /* ダウンロード */
    function dl(canvasId, filename) {
      const cvs = document.getElementById(canvasId);
      const a = document.createElement('a');
      a.download = filename;
      a.href = cvs.toDataURL('image/png');
      a.click();
    }

    function dlAll() {
      setTimeout(() => dl('c512', 'icon-512.png'), 0);
      setTimeout(() => dl('c192', 'icon-192.png'), 300);
      setTimeout(() => dl('c180', 'icon-180.png'), 600);
    }
  </script>
</body>
</html>
