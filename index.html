<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DISC SHELF — My App Portal</title>

  <!-- PWA / iPhone ホーム画面アイコン -->
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="icon" type="image/png" href="icon-512.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DISC SHELF" />
  <meta name="theme-color" content="#6C63FF" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ===== Aurora Background ===== -->
  <div class="aurora-bg" aria-hidden="true"></div>

  <!-- ===== ヘッダー ===== -->
  <header id="site-header">
    <div class="header-inner">
      <div class="logo" id="logo-home">
        <span class="logo-icon">◉</span>
        <span class="logo-text">DISC SHELF</span>
      </div>
      <p class="tagline">アプリを、ディスクで選ぶ。</p>
    </div>
  </header>

  <!-- ===== メインコンテンツ ===== -->
  <main id="app">

    <!-- ===== 棚ビュー (Shelf View) ===== -->
    <section id="shelf-view" class="view active">
      <div class="shelf-header">
        <h2 class="section-title section-title-large">MY DISC SHELF</h2>
        <div class="category-switcher">
        </div>
        <div class="shelf-actions">
          <button id="btn-list-view" class="btn-list-view" title="一覧表示">一覧</button>
          <button class="warp-portal-btn" id="warp-portal-btn" title="ワープポータル">🌀 ワープ</button>
        </div>
        <div id="current-category-label" class="current-category-label">セキュリティ</div>
        <p class="section-sub">ディスクをクリックしてアプリを読み込もう。ドラッグで棚を回せるよ。</p>
      </div>
      <div id="shelf-3d-container">
        <canvas id="shelf-canvas"></canvas>
        <div id="disc-tooltip" class="disc-tooltip hidden"></div>
      </div>
    </section>

      <!-- ===== 一覧ビュー (List View) ===== -->
      <section id="list-view" class="view">
        <div class="list-header">
          <h2 class="section-title">アプリ一覧</h2>
          <p class="section-sub">全ディスクをリストで表示</p>
        </div>
        <div id="disc-list-container"></div>
        <button id="btn-back-shelf" class="btn-back-shelf">戻る</button>
      </section>

  </main>

  <!-- ===== モーダル: ディスク確認 ===== -->
  <div class="modal-overlay" id="modal-launch">
    <div class="modal-launch-card">
      <button class="modal-close" id="modal-launch-close">✕</button>
      <div class="modal-launch-disc">
        <div class="modal-disc-ring" id="modal-disc-ring">
          <div class="modal-disc-inner">
            <span class="modal-disc-icon">◉</span>
          </div>
        </div>
      </div>
      <h3 class="modal-launch-name" id="modal-launch-name"></h3>
      <p class="modal-launch-desc" id="modal-launch-desc"></p>
      <div class="modal-launch-tags" id="modal-launch-tags"></div>
      <div class="modal-launch-actions">
        <a class="btn-launch" id="btn-launch" href="#" target="_blank" rel="noopener">
          <span class="launch-icon">▶</span> アプリを起動
        </a>
        <a class="btn-repo" id="btn-repo" href="#" target="_blank" rel="noopener">
          <span class="repo-icon">⟨/⟩</span> リポジトリを見る
        </a>
      </div>
    </div>
  </div>

  <!-- ===== フッター ===== -->
  <footer id="site-footer">
    <p>DISC SHELF © 2026 — One disc, one app.</p>
  </footer>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
