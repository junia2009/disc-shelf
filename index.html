<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DISC SHELF — My App Portal</title>

  <!-- PWA / iPhone ホーム画面アイコン -->
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DISC SHELF" />
  <meta name="theme-color" content="#6C63FF" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ===== ヘッダー ===== -->
  <header id="site-header">
    <div class="header-inner">
      <div class="logo" id="logo-home">
        <span class="logo-icon">◉</span>
        <span class="logo-text">DISC SHELF</span>
      </div>
      <p class="tagline">アプリを、ディスクで選ぶ。</p>
    </div>
  </header>

  <!-- ===== メインコンテンツ ===== -->
  <main id="app">

    <!-- ===== 棚ビュー (Shelf View) ===== -->
    <section id="shelf-view" class="view active">
      <div class="shelf-header">
        <h2 class="section-title">MY DISC SHELF</h2>
        <p class="section-sub">ディスクをクリックしてアプリを読み込もう。ドラッグで棚を回せるよ。</p>
      </div>
      <div id="shelf-3d-container">
        <canvas id="shelf-canvas"></canvas>
        <div id="disc-tooltip" class="disc-tooltip hidden"></div>
      </div>
    </section>

    <!-- ===== ディスクビュー (Disc Detail / Launch View) ===== -->
    <section id="disc-view" class="view">
      <button class="btn-back" id="btn-back">
        <span class="arrow">←</span> 棚に戻る
      </button>

      <div class="disc-stage">
        <div id="disc-3d-container">
          <canvas id="disc-canvas"></canvas>
        </div>
        <div class="disc-info">
          <h2 class="disc-app-name" id="disc-app-name"></h2>
          <p class="disc-description" id="disc-description"></p>
          <div class="disc-meta" id="disc-meta"></div>
          <div class="disc-actions">
            <a class="btn-launch" id="btn-launch" href="#" target="_blank" rel="noopener">
              <span class="launch-icon">▶</span> アプリを起動
            </a>
            <a class="btn-repo" id="btn-repo" href="#" target="_blank" rel="noopener">
              <span class="repo-icon">⟨/⟩</span> リポジトリ
            </a>
          </div>
        </div>
      </div>

      <!-- ディスク読み込み演出 -->
      <div class="loading-overlay" id="loading-overlay">
        <div class="loading-disc-wrapper">
          <div class="loading-spinner"></div>
          <p class="loading-text">ディスクを読み込み中…</p>
        </div>
      </div>
    </section>

  </main>

  <!-- ===== フッター ===== -->
  <footer id="site-footer">
    <p>DISC SHELF © 2026 — One disc, one app.</p>
  </footer>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
